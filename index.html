<!DOCTYPE html>
<html>
<head>
  <title>Wattpad Downloader</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h1>📖 Wattpad Downloader</h1>

  <input id="url" placeholder="Paste Wattpad link..." style="width:300px; padding:10px;" />
  <br><br>

  <button onclick="download()" style="padding:10px 20px;">Download EPUB</button>

  <p id="status"></p>

  <script>
    function download() {
      const url = document.getElementById("url").value;
      const status = document.getElementById("status");

      if (!url) {
        status.innerText = "Vui lòng nhập link!";
        return;
      }

      status.innerText = "⏳ Đang chuyển hướng...";

      // redirect trực tiếp sang backend
      window.open(
        "https://wattpaddownloader.onrender.com/download?url=" + encodeURIComponent(url),
        "_blank"
      );
    }
  </script>

</body>
</html>
