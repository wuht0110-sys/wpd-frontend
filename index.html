<!DOCTYPE html>
<html>
<head>
  <title>Wattpad Downloader</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h1>📖 Wattpad Downloader</h1>

  <input id="url" placeholder="Paste Wattpad link..." style="width:300px; padding:10px;" />
  <br><br>

  <button onclick="download()" style="padding:10px 20px;">Download EPUB</button>

  <p id="status"></p>

  <script>
    async function download() {
      const url = document.getElementById("url").value;
      const status = document.getElementById("status");

      if (!url) {
        status.innerText = "Vui lòng nhập link!";
        return;
      }

      status.innerText = "⏳ Đang tải...";

      try {
        const res = await fetch("https://wattpaddownloader.onrender.com/download", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        if (!res.ok) throw new Error();

        const blob = await res.blob();
        const link = document.createElement("a");

        link.href = window.URL.createObjectURL(blob);
        link.download = "book.epub";
        link.click();

        status.innerText = "✅ Tải xong!";
      } catch (err) {
        status.innerText = "❌ Lỗi! Có thể link sai hoặc server sleep.";
      }
    }
  </script>

</body>
</html>
